name: CI

# Opt Actions internals into Node 24 (Node 20 runner deprecation). See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least privilege: read repo contents only (checkout, cache); no packages/issues write.
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_sitl:
        description: "Run PX4 SITL HIL mission test"
        required: false
        default: "false"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Ruff check
        run: cd backend && ruff check src/

      - name: Ruff format check
        run: cd backend && ruff format --check src/

      - name: Pyright type check
        run: cd backend && python -m pyright

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend
        run: cd backend && pip install -e ".[dev]" && pip install bandit pip-audit

      - name: Bandit security scan
        run: cd backend && bandit -r src/ -ll

      - name: pip-audit
        run: cd backend && pip-audit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend
        run: cd backend && pip install -e ".[dev]" && pip install pytest-cov

      - name: Run tests with coverage
        run: cd backend && pytest -v --tb=short --cov=src/gorzen --cov-report=term-missing --cov-fail-under=40

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test, and build frontend
        run: |
          cd frontend
          npm ci
          npm run test
          npm run build

  sitl:
    # Opt-in HIL job: runs a PX4 SITL jMAVSim mission and asserts the
    # VTOL quadplane arms, takes off, transitions to FW, cruises, lands.
    # Launched via `workflow_dispatch` with `run_sitl=true` to keep the
    # normal PR pipeline fast.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_sitl == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend (+ pymavlink, pytest)
        run: |
          cd backend
          pip install -e ".[dev]"
          pip install pymavlink mavsdk

      - name: Build PX4 SITL (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y git ninja-build cmake build-essential genromfs xxd \
            libxml2-utils astyle python3-numpy python3-toml python3-yaml python3-jinja2 \
            python3-jsonschema python3-empy
          git clone --depth 1 --recurse-submodules https://github.com/PX4/PX4-Autopilot.git
          cd PX4-Autopilot
          HEADLESS=1 DONT_RUN=1 make px4_sitl_default gazebo-classic

      - name: Run PX4 SITL + Gorzen VTOL mission
        env:
          RUN_SITL: "1"
        run: |
          cd PX4-Autopilot
          nohup bash -c "HEADLESS=1 make px4_sitl_default gazebo-classic_standard_vtol" > sitl.log 2>&1 &
          sleep 60
          cd ../backend
          pytest -v -m integration tests_sitl/

  mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check docs/telemetry.md exists
        run: test -f docs/telemetry.md
