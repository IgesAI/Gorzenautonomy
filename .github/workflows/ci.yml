name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
          pip install ruff bandit

      - name: Ruff check
        run: cd backend && ruff check src/

      - name: Ruff format check
        run: cd backend && ruff format --check src/

      - name: Pyright type check
        run: cd backend && python -m pyright

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        run: cd backend && pip install -e ".[dev]" && pip install bandit pip-audit

      - name: Bandit security scan
        run: cd backend && bandit -r src/ -ll

      - name: pip-audit
        run: cd backend && pip-audit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        run: cd backend && pip install -e ".[dev]"

      - name: Run tests
        run: cd backend && pytest -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build
